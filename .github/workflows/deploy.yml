name: Deploy Lambda Project

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt
      - run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Package Lambda files
        run: |
          mkdir -p dist
          cp compliance_checker.py janitor.py dist/
          cd dist && zip -r ../lambda-package.zip .
      - name: Deploy compliance checker
        run: |
          aws lambda update-function-code --function-name cloud-compliance-checker --zip-file fileb://lambda-package.zip --publish
      - name: Deploy janitor
        run: |
          aws lambda update-function-code --function-name cloud-janitor --zip-file fileb://lambda-package.zip --publish
